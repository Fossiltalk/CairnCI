# Dogfood caller: validate this repo's own metadata on every PR.
# This is also the reference example for consumers (see examples/caller-validate.yml),
# except a consumer would call the reusable workflow by full path + version tag:
#   uses: Fossiltalk/CairnCI/.github/workflows/sf-validate.yml@v1
name: CI Validate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "force-app/**"

jobs:
  validate:
    uses: ./.github/workflows/sf-validate.yml
    with:
      source-dir: force-app
      test-level: RunLocalTests
    secrets: inherit

  # Dogfood the optional governance gate (Phase 2 extension).
  field-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
      - uses: ./.github/actions/field-permset-gate
        with:
          source-dir: force-app
          require-permission-set: "true"
          forbid-breaking-field-changes: "true"
          # Tighten over time as the org matures:
          # require-description: "true"
          # require-data-sensitivity: "true"
